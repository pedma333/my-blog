<!DOCTYPE html>
<html lang="ko" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="마크다운으로 작성한 블로그">
  <title>my-blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <a href="/" class="site-title">my-blog</a>
        <nav class="header-nav">
          <button class="theme-toggle" id="themeToggle" aria-label="다크모드 토글" title="다크모드">
            <span id="themeIcon">🌙</span>
          </button>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="blog-home">
        <h1>블로그</h1>
        <p>마크다운으로 작성한 글들을 모아놨습니다.</p>

        <div class="blog-grid" id="blogGrid">
          <!-- JavaScript로 동적 생성 -->
          <div class="text-center" style="grid-column: 1 / -1; padding: 2rem;">
            <p>블로그 글을 불러오는 중...</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/theme.js"></script>
  <script src="js/markdown-parser.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
